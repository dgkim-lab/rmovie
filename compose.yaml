services:
  app:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: rmovie
      OTEL_TRACES_SAMPLER: always_on
      GOOGLE_CREDENTIALS_FILE: /app/credentials.json
      DATABASE_URL: postgresql://rmovie:${RMOVIE_DB_PASSWORD:-replace-me}@postgres:5432/rmovie
    volumes:
      - ./credentials.json:/app/credentials.json:ro
    ports:
      - "3000:3000"
    depends_on:
      otel-collector:
        condition: service_started
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - postgres-data:/var/lib/postgresql/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.147.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/jaeger:2.16.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"

volumes:
  postgres-data:
