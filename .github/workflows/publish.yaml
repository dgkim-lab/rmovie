name: Publish container

on:
  push:
    branches: [main, "feature/**"]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  APP_NAME: rmovie
  DEPLOY_ENVIRONMENT: ${{ vars.DEPLOY_ENVIRONMENT || 'dev' }}
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: version
        name: Resolve application version
        run: echo "value=$(git describe --tags)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=tag
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Dispatch image update to GitOps
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/feature/')
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          repository: ${{ vars.GITOPS_REPOSITORY }}
          event-type: image-published
          client-payload: >-
            {
              "app": "${{ env.APP_NAME }}",
              "image": "${{ env.IMAGE_NAME }}",
              "tag": "${{ steps.meta.outputs.version }}",
              "environment": "${{ env.DEPLOY_ENVIRONMENT }}"
            }
